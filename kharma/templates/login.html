<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kharma Sentinel - Secure Login</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.294.0"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-deep: #020617;
            --bg-panel: rgba(15, 23, 42, 0.8);
            --border: rgba(51, 65, 85, 0.4);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
        }

        .login-card {
            width: 400px;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand h1 {
            font-size: 1.25rem;
            letter-spacing: 0.3em;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .brand p {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            width: 1rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
            background: rgba(0, 0, 0, 0.5);
        }

        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #064e3b;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
            filter: brightness(1.1);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-top: 1.5rem;
            display: none;
            text-align: center;
        }

        /* Decorative background elements */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: 1;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 2;
            opacity: 0.1;
        }

        .orb-1 {
            top: -100px;
            left: -100px;
            background: var(--accent);
            animation: float 20s infinite alternate;
        }

        .orb-2 {
            bottom: -100px;
            right: -100px;
            background: #6366f1;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(100px, 100px);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="brand">
            <h1>KHARMA<span>_SENTINEL</span></h1>
            <p>PROACTIVE DEFENSE SUITE</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Access Identity</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" placeholder="Sentinel User" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Encryption Key</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i data-lucide="shield-check" style="width: 1rem;"></i>
                Authenticate
            </button>

            <div id="error-msg" class="error-msg">
                Authentication failed. Access Denied.
            </div>
        </form>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store JWT for subsequent API calls
                    if (data.token) {
                        localStorage.setItem('kharma_jwt', data.token);
                    }
                    // Redirect to dashboard on success
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Authentication failed.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server connection failed.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
