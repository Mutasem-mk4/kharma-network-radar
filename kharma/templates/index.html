<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kharma Sentinel</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.294.0"></script>
    <meta name="session-token" content="{{ session_token }}">

    <!-- Leaflet for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <div class="app-container">
        <!-- Minimalist Header -->
        <header class="top-nav">
            <div class="brand">
                <i data-lucide="shield" style="color: var(--accent); width: 24px; height: 24px;"></i>
                <h1>KHARMA<span class="fw-light">_SENTINEL</span></h1>
            </div>

            <div class="header-stats">
                <div class="stat-pill">
                    <div class="status-indicator online"></div>
                    <span>SYSTEM ONLINE</span>
                </div>
                <div class="stat-pill">
                    <i data-lucide="activity" style="width: 14px; height: 14px; color: var(--text-dim);"></i>
                    <span id="conn-count">0</span> Sockets
                </div>
                <button class="action-btn" onclick="toggleSettings()" title="Settings">
                    <i data-lucide="settings" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </header>

        <main class="main-layout">
            <!-- Left Column: Map -->
            <section class="card map-card">
                <div class="card-header">
                    <h2>Live Topology</h2>
                    <div class="legend">
                        <span class="legend-item"><span class="dot safe"></span> Safe</span>
                        <span class="legend-item"><span class="dot threat"></span> Threat</span>
                    </div>
                </div>
                <div id="radar-map" class="map-container"></div>
            </section>

            <!-- Right/Bottom Area: Data Table -->
            <section class="card table-card">
                <div class="card-header flex-between">
                    <h2>Active Processes</h2>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Process</th>
                                <th>PID</th>
                                <th>Remote Target</th>
                                <th class="text-right">IN (KB/s)</th>
                                <th class="text-right">OUT (KB/s)</th>
                                <th>Location</th>
                                <th>Intelligence</th>
                                <th class="text-right">Status</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="radar-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Panel (Sidebar) -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>System Settings</h3>
            <button class="close-btn" onclick="toggleSettings()"><i data-lucide="x"></i></button>
        </div>
        <div class="settings-content">
            <div class="settings-group">
                <label><i data-lucide="send"></i> Telegram Notifications</label>
                <div class="input-field">
                    <input type="password" id="tg-token" placeholder="Bot Token">
                    <button class="icon-toggle" onclick="toggleField('tg-token')"><i data-lucide="eye"></i></button>
                </div>
                <div class="input-field">
                    <input type="text" id="tg-chat-id" placeholder="Chat ID">
                </div>
            </div>

            <div class="settings-actions">
                <button class="action-btn success w-100" onclick="saveSettings()">Save Config</button>
                <button class="action-btn w-100" onclick="testTelegram()">Test Alert</button>
            </div>
        </div>
        <div class="settings-footer">
            <p>Shield Mode: Active Intelligence</p>
        </div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSettings()"></div>

    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="/static/js/app.js?v=3"></script>
</body>

</html>
