name: Build Debian Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build_deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fpm and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm --no-document
          pip install --upgrade pip setuptools wheel

      - name: Build .deb with fpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s python -t deb \
            --name kharma-radar \
            --version "$VERSION" \
            --architecture all \
            --maintainer "Mutasem Alashkar <mutasem@example.com>" \
            --description "AI-powered Network Radar and Host Intrusion Prevention System" \
            --url "https://github.com/Mutasem-mk4/kharma-network-radar" \
            --license MIT \
            --category net \
            --depends python3 \
            --python-bin python3 \
            --python-pip pip3 \
            --python-package-name-prefix python3 \
            setup.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: "*.deb"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
